<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PikiPiki · Sign in</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: linear-gradient(135deg, #0a0f1e 0%, #1a2438 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    color: #f1f5f9;
  }
  .box {
    background: rgba(15, 23, 42, .85); backdrop-filter: blur(20px);
    border: 1px solid rgba(148, 163, 184, .15);
    border-radius: 16px; padding: 40px 36px; width: min(400px, 92vw);
    box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
  }
  h1 { font-size: 1.5rem; margin-bottom: 6px; letter-spacing: -.02em; }
  .sub { color: #94a3b8; font-size: .9rem; margin-bottom: 30px; }
  label { display: block; font-size: .78rem; color: #94a3b8;
          text-transform: uppercase; letter-spacing: .08em;
          margin-bottom: 8px; margin-top: 18px; }
  input {
    width: 100%; padding: 12px 14px; border-radius: 8px;
    border: 1px solid rgba(148, 163, 184, .2);
    background: rgba(0, 0, 0, .3); color: #f1f5f9; font-size: .95rem;
    outline: none; transition: border-color .15s;
  }
  input:focus { border-color: #10b981; }
  button {
    width: 100%; margin-top: 28px; padding: 13px;
    background: #10b981; color: #fff; font-weight: 600; font-size: .95rem;
    border: 0; border-radius: 8px; cursor: pointer; letter-spacing: .02em;
    transition: background .15s;
  }
  button:hover { background: #059669; }
  .err {
    background: rgba(239, 68, 68, .12);
    border: 1px solid rgba(239, 68, 68, .3);
    color: #fca5a5; padding: 10px 14px; border-radius: 8px;
    font-size: .85rem; margin-bottom: 20px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
  .brand-mark {
    width: 32px; height: 32px; border-radius: 8px;
    background: linear-gradient(135deg, #10b981, #0d7f5c);
    display: flex; align-items: center; justify-content: center;
    font-size: .72rem; font-weight: 800; color: #fff;
    font-family: "SF Mono", Menlo, monospace;
  }
  .brand-name { font-weight: 700; letter-spacing: -.01em; }
</style>
</head>
<body>
  <form class="box" method="POST" action="/login" autocomplete="on">
    <div class="brand">
      <div class="brand-mark">PP</div>
      <div class="brand-name">PikiPiki Records</div>
    </div>
    <h1>Sign in</h1>
    <div class="sub">Enter your username and password.</div>

    {% if error %}<div class="err">{{ error }}</div>{% endif %}

    <label for="u">Username</label>
    <input id="u" name="username" type="text" required autofocus autocapitalize="off" autocomplete="username">

    <label for="p">Password</label>
    <input id="p" name="password" type="password" required autocomplete="current-password">

    <button type="submit">Sign in</button>
  </form>
</body>
</html>
