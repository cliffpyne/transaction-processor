{% extends "home.html" %}
{% block content %}
     <!-- Container -->
     <div class="kt-container-fixed" id="contentContainer">
     </div>
     <!-- End of Container -->

     <!-- Top sub-nav — product tabs -->
     <style>
      /* Metronic's kt-menu-item-here Tailwind variants sometimes get stripped
         by ktui's init pass. We drive the active state with a plain class so
         the blue text + underline always render. */
      #txn_producttabs .txn-tab.is-active {
       border-bottom-color: var(--color-primary);
      }
      #txn_producttabs .txn-tab.is-active .kt-menu-title {
       color: var(--color-primary);
       font-weight: 600;
      }
     </style>
     <div class="flex items-center flex-wrap md:flex-nowrap lg:items-end justify-between border-b border-b-border gap-3 lg:gap-6 mb-5 lg:mb-10">
      <div class="kt-container-fixed" id="hero_container">
       <div class="grid">
        <div class="kt-scrollable-x-auto">
         <div class="flex gap-3" id="txn_producttabs">
          <div class="txn-tab kt-menu-item border-b-2 border-b-transparent is-active" data-product="">
           <a class="kt-menu-link gap-1.5 pb-2 lg:pb-4 px-2" href="#">
            <span class="kt-menu-title text-nowrap font-medium text-sm text-secondary-foreground">
             All
            </span>
           </a>
          </div>
          <div class="txn-tab kt-menu-item border-b-2 border-b-transparent" data-product="boda">
           <a class="kt-menu-link gap-1.5 pb-2 lg:pb-4 px-2" href="#">
            <span class="kt-menu-title text-nowrap font-medium text-sm text-secondary-foreground">
             Boda
            </span>
           </a>
          </div>
          <div class="txn-tab kt-menu-item border-b-2 border-b-transparent" data-product="iphone">
           <a class="kt-menu-link gap-1.5 pb-2 lg:pb-4 px-2" href="#">
            <span class="kt-menu-title text-nowrap font-medium text-sm text-secondary-foreground">
             iPhone
            </span>
           </a>
          </div>
          <div class="txn-tab kt-menu-item border-b-2 border-b-transparent" data-product="iliyopata">
           <a class="kt-menu-link gap-1.5 pb-2 lg:pb-4 px-2" href="#">
            <span class="kt-menu-title text-nowrap font-medium text-sm text-secondary-foreground">
             Iliyopata
            </span>
           </a>
          </div>
         </div>
        </div>
       </div>
      </div>
     </div>
     <!-- End of sub-nav -->

     <!-- Container -->
     <div class="kt-container-fixed">
      <div class="flex flex-wrap items-center lg:items-end justify-between gap-5 pb-7.5">
       <div class="flex flex-col justify-center gap-2">
        <h1 class="text-xl font-medium leading-none text-mono">
         Transactions
        </h1>
        <div class="flex items-center gap-2 text-sm font-normal text-secondary-foreground">
         Bank credits captured from CRDB and NMB
        </div>
       </div>
       <div class="flex items-center gap-2.5">
        <a class="kt-btn kt-btn-outline" href="/api/transactions/export">
         Export CSV
        </a>
       </div>
      </div>
     </div>
     <!-- End of Container -->
     <!-- Container -->
     <div class="kt-container-fixed">
      <div class="grid gap-5 lg:gap-7.5">
       <div class="kt-card kt-card-grid min-w-full">
        <!-- Quick date filters -->
        <div class="kt-card-header py-3 flex-wrap gap-3">
         <div class="flex flex-wrap gap-2 items-center" id="txn_quickfilters">
          <button class="kt-btn kt-btn-sm kt-btn-outline" data-range="today">Today</button>
          <button class="kt-btn kt-btn-sm kt-btn-outline" data-range="yesterday">Yesterday</button>
          <button class="kt-btn kt-btn-sm kt-btn-outline" data-range="7d">Last 7 days</button>
          <button class="kt-btn kt-btn-sm kt-btn-outline" data-range="month">This month</button>
          <button class="kt-btn kt-btn-sm kt-btn-outline" data-range="last_month">Last month</button>
          <button class="kt-btn kt-btn-sm kt-btn-outline kt-btn-primary" data-range="all">All time</button>
         </div>
         <div class="flex flex-wrap gap-2 items-center">
          <div class="flex items-center gap-1.5">
           <label class="text-sm text-secondary-foreground shrink-0">From</label>
           <input class="kt-input h-8 text-sm shrink-0 cursor-pointer" id="txn_from" type="datetime-local" style="width:200px"
                  onclick="try{this.showPicker()}catch(e){}"/>
          </div>
          <div class="flex items-center gap-1.5">
           <label class="text-sm text-secondary-foreground shrink-0">To</label>
           <input class="kt-input h-8 text-sm shrink-0 cursor-pointer" id="txn_to" type="datetime-local" style="width:200px"
                  onclick="try{this.showPicker()}catch(e){}"/>
          </div>
          <button class="kt-btn kt-btn-sm kt-btn-outline shrink-0" id="txn_range_clear">Clear</button>
         </div>
        </div>
        <div class="kt-card-header flex-wrap gap-2">
         <h3 class="kt-card-title text-sm" id="txn_showing">
          Loading transactions…
         </h3>
         <div class="flex flex-wrap gap-2 lg:gap-5">
          <div class="flex">
           <label class="kt-input">
            <i class="ki-filled ki-magnifier">
            </i>
            <input id="txn_search" placeholder="Search customer, ref, description…" type="text" value=""/>
           </label>
          </div>
          <div class="flex flex-wrap gap-2.5">
           <select class="kt-select w-32" data-kt-select="true" data-kt-select-placeholder="All banks" id="txn_bank">
            <option value="">
             All banks
            </option>
            <option value="CRDB">
             CRDB
            </option>
            <option value="NMB">
             NMB
            </option>
           </select>
           <select class="kt-select w-36" data-kt-select="true" data-kt-select-placeholder="All statuses" id="txn_status">
            <option value="">
             All statuses
            </option>
            <option value="passed">
             Passed
            </option>
            <option value="failed">
             Failed
            </option>
           </select>
           <select class="kt-select w-36" data-kt-select="true" data-kt-select-placeholder="Sort by" id="txn_sort">
            <option value="transaction_date.desc.nullslast">
             Newest first
            </option>
            <option value="transaction_date.asc.nullslast">
             Oldest first
            </option>
            <option value="credit_amount.desc.nullslast">
             Highest amount
            </option>
            <option value="credit_amount.asc.nullslast">
             Lowest amount
            </option>
           </select>
          </div>
         </div>
        </div>
        <div class="kt-card-table">
         <div class="grid">
          <div class="kt-scrollable-x-auto">
           <table class="kt-table kt-table-border">
            <thead id="txn_thead">
             <!-- Columns rendered by JS so the Iliyopata tab can show
                  New Date / Old Date / Rescued by while the other tabs
                  keep a single Date column. -->
            </thead>
            <tbody id="txn_tbody">
             <tr>
              <td class="text-center text-secondary-foreground py-6" colspan="9">
               Loading transactions…
              </td>
             </tr>
            </tbody>
           </table>
          </div>
          <div class="kt-card-footer justify-center md:justify-between flex-col md:flex-row gap-5 text-secondary-foreground text-sm font-medium">
           <div class="flex items-center gap-2 order-2 md:order-1">
            Show
            <select class="kt-select w-20" id="txn_perpage">
             <option value="25">25</option>
             <option value="50">50</option>
             <option value="100">100</option>
             <option value="500">500</option>
             <option value="1000">1000</option>
             <option value="1500">1500</option>
             <option value="2000">2000</option>
            </select>
            per page
           </div>
           <div class="flex items-center gap-4 order-1 md:order-2">
            <span id="txn_info">
            </span>
            <div class="flex items-center gap-1" id="txn_pager">
            </div>
           </div>
          </div>
         </div>
        </div>
       </div>
      </div>
     </div>
     <!-- End of Container -->

     <!-- Rescue modal — pick a customer for a FAILED transaction -->
     <div class="fixed inset-0 z-50 hidden bg-black/40 items-center justify-center p-4" id="rescue_backdrop">
      <div class="bg-background rounded-lg shadow-2xl w-full max-w-[520px] p-5 border border-border">
       <div class="flex items-start justify-between mb-4">
        <div>
         <h3 class="text-lg font-semibold text-mono">Move to Iliyopata</h3>
         <p class="text-sm text-secondary-foreground" id="rescue_subtitle">Pick the customer.</p>
        </div>
        <button class="kt-btn kt-btn-icon kt-btn-ghost" id="rescue_close">
         <i class="ki-filled ki-cross"></i>
        </button>
       </div>
       <label class="kt-input mb-2">
        <i class="ki-filled ki-magnifier"></i>
        <input id="rescue_search" placeholder="Search name, phone, plate…" type="text" autocomplete="off"/>
       </label>
       <div class="border border-border rounded max-h-[300px] overflow-y-auto" id="rescue_results">
        <div class="text-sm text-secondary-foreground p-3 text-center">Start typing to search…</div>
       </div>
       <div class="flex justify-end gap-2 mt-4">
        <button class="kt-btn kt-btn-outline" id="rescue_cancel">Cancel</button>
        <button class="kt-btn kt-btn-primary" id="rescue_confirm" disabled>Move</button>
       </div>
      </div>
     </div>

     <script src="/static/transactions_page.js" defer></script>
{% endblock %}
